
###### KEY BINDING ######

# change leader Ctrl-b by Ctrl-space
set -g prefix C-space

#act like vim
setw -g mode-keys vi

# change mode copy shortcut form [ to v
unbind [
bind v copy-mode

##### MISCELLANEOUS ######

# Support mouse
set -g mouse on

#256 colors terminal
set -g default-terminal "tmux-256color"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# split window keep the current working dir
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# reload config with leader shift r
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded ✅"

# set shell
set -g default-shell /bin/zsh

###### PLUGINS ######
# Define plugin path outside ~/.config/tmux/ (standard XDG Base Directory)
TMUX_PLUGIN_MANAGER_PATH="$HOME/.local/share/tmux/plugins/"
#set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins/"

# TPM : plugin manager
# Leader + I : install new plugins

# Auto-install TPM from git if not available
if "test ! -d ~/.local/share/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.local/share/tmux/plugins/tpm && ~/.local/share/tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'

#tmux-sensible : improve some default tmux behaviour
# Leader + R : reload config
set -g @plugin 'tmux-plugins/tmux-sensible'

#tmux-yank : enable y copie to clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

#Plugin saving sessions
# Leader + Ctrl-s : save
# Leader + Ctrl-r : restore
# Disabled, use tmuxinator instead
# set -g @plugin 'tmux-plugins/tmux-resurrect'

#Plugin for better integration with nvim also added in nvim plugins
#Maybe replace by christoomey/vim-tmux-navigator
set -g @plugin 'aserowy/tmux.nvim'

#Binding navigate between panel with Control + hjkl (see plugin doc)
is_vim_or_lazygit="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|n?vim?x?|lazygit)(-wrapped)?(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim_or_lazygit" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim_or_lazygit" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim_or_lazygit" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim_or_lazygit" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

#Binding for resizing panel with Alt + hjkl (see plugin doc)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n M-Left  if-shell "$is_vim" 'send-keys M-Left'  'resize-pane -L 1'
bind -n M-Down  if-shell "$is_vim" 'send-keys M-Down'  'resize-pane -D 1'
bind -n M-Up    if-shell "$is_vim" 'send-keys M-Up'    'resize-pane -U 1'
bind -n M-Right if-shell "$is_vim" 'send-keys M-Right' 'resize-pane -R 1'
bind-key -T copy-mode-vi M-Left  resize-pane -L 1
bind-key -T copy-mode-vi M-Down  resize-pane -D 1
bind-key -T copy-mode-vi M-Up    resize-pane -U 1
bind-key -T copy-mode-vi M-Right resize-pane -R 1

#Theme for status bar
set -g @plugin 'catppuccin/tmux'

###### STATUS LINE ######

#set status line on top
set -g status-position top

# Configure the catppuccin plugin
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"

# leave this unset to let applications set the window title
set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_status "icon"
set -g @catppuccin_window_current_background "#{@thm_sky}"

# Select informations displayed on the status line 
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

##### END #####
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.local/share/tmux/plugins/tpm/tpm'
