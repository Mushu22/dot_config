[git_status]
format = "[´æä $all_status$ahead_behind ](bg:c2 fg:true-black)"

# -----------------------
# Langages dynamiques
# -----------------------

[python]
format = "[ ¯êÁ $version( \\($virtualenv\\)) ](bg:c3 fg:true-black)"

[c]
format = "[ ¯ÿ× $version ](bg:c3 fg:true-black)"

[nodejs]
format = "[ ¯£ÿ $version](bg:c3 fg:true-black)"

[lua]
format = "[ ¯ÿá $version](bg:c3 fg:true-black)"

[cmake]
format = "[ ¾░öÂ $version](bg:c3 fg:true-black)"

[rust]
format = "[ ¯×¿ $version](bg:c3 fg:true-black)"

[docker_context]
format = "[ ´êƒ $context ](bg:c3 fg:true-black)"
