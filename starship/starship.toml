# -----------------------
# End of prompt char
# -----------------------

[character]
success_symbol = "[Ô×£](bold green)"
error_symbol = "[Ô×£](bold red)"

# -----------------------
# Dur├®e + statut
# -----------------------

[cmd_duration]
format = "[ $duration](fg:yellow)"
min_time = 1000

[status]
disabled = false
symbol = "Ô£ÿ"
success_symbol = "Ô£ö"
format = "[ $symbol $common_meaning$signal_name$maybe_int](fg:$style) "
style = "red"
success_style = "green"

# -----------------------
# Batterie + job + heure
# -----------------------

[jobs]
symbol = "ÔÜÖ "
format = "[ $symbol$number ](bg:cr1 fg:true-black)"
threshold = 1

[time]
disabled = false
time_format = "%H:%M"
format = "[ ´É║ $time ](bg:cr2 fg:true-black)"

[battery]
format = "[ $symbol$percentage ](bg:cr3 fg:true-black)"
full_symbol = "¾░ü╣ "
charging_symbol = "¾░éä "
discharging_symbol = "¾░éâ "
