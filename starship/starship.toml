# -----------------------
# Palette de couleurs
# -----------------------
[palettes.my_theme]
c1 = "bright-cyan"
c2 = "bright-yellow"
c3 = "bright-green"
cr1 = "bright-cyan"
cr2 = "bright-blue"
cr3 = "bright-purple"
true-black = "#000000"

# -----------------------
# OS + drirectory
# -----------------------

[directory]
format = "[ $path $read_only](bold bg:c1 fg:true-black)"
truncation_length = 4
truncate_to_repo = false
read_only = "¾░î¥"

[os]
disabled = false
format = "[$symbol](bg:c1 fg:true-black)"

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
